{% extends 'base.html' %}
{% block content %}
<h1>Mon compte</h1>
<section>
  <p><strong>Nom:</strong> {{ user['username'] }}</p>
  <p><strong>Email:</strong> {{ user['email'] }}</p>
  <p><strong>Role:</strong> {{ 'Administrateur' if user['is_admin'] else 'Utilisateur' }}</p>
  <p><a href="{{ url_for('account_edit') }}">Modifier mes informations</a></p>
  <p><a href="{{ url_for('account_delete') }}">Supprimer mon compte</a></p>
</section>
{% endblock %}
