{% extends 'base.html' %}
{% block content %}
<section>
  <h1>Site utile, sobre et fonctionnel</h1>
  <p>Version optimisee avec peu de pages, peu de ressources et fonctions essentielles.</p>
</section>
<section id="quiz" aria-live="polite">
  <h2>Mini Quiz Green IT</h2>
  <p class="muted">Quiz local, sans API externe.</p>
  <article>
    <h3 id="question">Chargement...</h3>
    <div id="choices" class="actions"></div>
    <p id="feedback" class="muted"></p>
    <p><button id="nextBtn" type="button">Question suivante</button></p>
  </article>
  <p><strong>Score:</strong> <span id="score">0</span>/<span id="total">0</span></p>
</section>
{% endblock %}
