{% extends 'base.html' %}
{% block content %}
<h1>Suppression utilisateur</h1>
<section>

      Je confirme la suppression
    </label>
    <p><button type="submit">Supprimer definitivement</button></p>
  </form>
</section>
{% endblock %}
